id: 04-sisters
title: 姐妹难分
difficulty: hard
surface: |
  一个雨天，男人拉着一个大行李箱出门。他在门口碰见了自己的妻子，
  和妻子兴奋地说了几句话后，他神色忽然古怪至极。
  他仔细看了看妻子的侧脸，看了看手表，又转头看了看门外的大雨。
  而后他慌慌张张拉着行李箱走了，从此销声匿迹。
base: |
  女人有个长相一模一样的双胞胎姐姐。女人老公偷偷出轨了双胞胎姐姐。
  双胞胎姐姐与女人老公偷情时，为了把自己和女人区别开来，会在侧脸画一颗显眼的痣。
  最近，女人的老公已经完全厌倦女人，一直在找机会杀了女人。
  一个雨天，女人照常出门工作。趁此机会，老公又邀请了姐姐来家里偷情。
  老公发现坐在沙发上的这个女人脸上没有痣，他十分慌乱，以为妻子突然回家。
  担心偷情败露，他打算今天就杀死妻子。于是他悄悄走过去杀死女人，肢解后把尸体装进行李箱，出门抛尸。
  出门后，他在门外遇见一个女人，起初他以为是姐姐（自己的情人），于是兴奋地说了几句话。
  说话后他发现不对，仔细一看，这个女的脸上也没有痣。他看手表，发现是妻子往常下班回家的时间。
  今天一直在下大雨。他突然明白，刚才家里的那个女人就是姐姐——因为是雨天，她脸上的痣被雨水洗掉了。
  他杀错了人。震惊后怕之余，他带着行李箱逃走了。
key_points:
  - 妻子有一个长相一模一样的双胞胎姐姐
  - 男人与双胞胎姐姐有偷情关系
  - 姐姐通过在侧脸画痣来和妻子做区分
  - 男人蓄谋要杀死自己的妻子
  - 行李箱里装的是被杀害的尸体
  - 雨水洗掉了姐姐脸上的痣，男人把姐姐错认成了妻子
  - 男人实际上杀的是姐姐而不是妻子
