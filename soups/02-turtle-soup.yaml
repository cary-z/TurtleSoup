id: 02-turtle-soup
title: 海龟汤
difficulty: medium
surface: |
  一个男人走进一家餐厅，点了一碗海龟汤。
  他喝了一口汤后，突然放下勺子，离开餐厅，然后自杀了。
  为什么？
base: |
  多年前，这个男人和朋友们在一次海上事故后困在荒岛上。食物耗尽后，
  一个朋友声称捕到了海龟，用海龟肉煮了汤给大家喝，大家才活了下来。
  但其实那碗汤是用已经死去的同伴的肉做的。男人在餐厅喝到真正的海龟汤后，
  发现味道完全不同，终于意识到当年喝的根本不是海龟汤，
  而是同伴的肉。他无法承受这个真相，选择了自杀。
key_points:
  - 男人曾经历过海上事故/遇难
  - 在荒岛上有人声称做了海龟汤
  - 当年的汤实际上是用死去同伴的肉做的
  - 餐厅的真海龟汤让他发现了当年的真相
  - 无法承受真相是他自杀的原因
