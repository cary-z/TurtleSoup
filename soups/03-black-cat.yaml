id: 03-black-cat
title: 黑猫
difficulty: hard
surface: |
  我杀了人，当警察带走我的时候，我看到了门口的黑猫，它一直在盯着我。
  这一刻我知道我错了…
base: |
  我经常能在楼下看到那只黑猫，但由于工作出差的原因，所以我只能偶尔投喂它。
  那天出差回来，我发现阳台上有很多死老鼠，我下意识想到经常闹矛盾的邻居，
  随后便冲进了他家，伴随着惊呼声和警笛声，我看到了那只黑猫，
  它也在看着我，嘴里还叼着一只老鼠...
key_points:
  - 我经常投喂楼下的黑猫
  - 出差回来发现阳台上有很多死老鼠
  - 我误以为是经常闹矛盾的邻居所为，冲进邻居家杀了人
  - 死老鼠实际上是黑猫叼来报恩的"礼物"
  - 我错怪了邻居，杀错了人
